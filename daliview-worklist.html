<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>DaliView — Менеджер исследований</title>
<style>
  :root{--bg:#0b0f14;--panel:#0e131a;--chrome:#11161d;--bd:#232a33;--tx:#c9d1d9;--mut:#8b949e;--dim:#6e7681;--ac:#2dd4bf;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px}
  a{color:inherit;text-decoration:none}
  .app{display:flex;flex-direction:column;height:100vh}
  .titlebar{display:flex;align-items:center;justify-content:space-between;background:var(--chrome);border-bottom:1px solid var(--bd);padding:8px 14px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:500;color:#e6edf3}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ac)}
  .titlebar .r{display:flex;gap:16px;color:var(--mut);font-size:12px;align-items:center}
  .ac{color:var(--ac)}
  .filters{display:flex;align-items:center;gap:10px;background:var(--panel);border-bottom:1px solid var(--bd);padding:10px 14px;flex-wrap:wrap}
  .filters input,.filters select{background:#0b0f14;border:1px solid var(--bd);color:var(--tx);border-radius:7px;padding:7px 10px;font-size:12px;outline:none}
  .filters input:focus,.filters select:focus{border-color:var(--ac)}
  .qf{font-size:11px;color:var(--mut);border:1px solid var(--bd);padding:5px 10px;border-radius:6px;cursor:pointer}
  .qf.on{color:#06201c;background:var(--ac);border-color:var(--ac)}
  .wrap{flex:1;overflow:auto;padding:0}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{position:sticky;top:0;background:#0e131a;text-align:left;color:var(--dim);font-weight:500;font-size:11px;padding:10px 14px;border-bottom:1px solid var(--bd)}
  tbody td{padding:11px 14px;border-bottom:1px solid #181d25}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#131a24}
  tbody tr.sel{background:#13202066}
  .th{width:42px;height:34px;border-radius:5px;border:1px solid var(--bd);background:radial-gradient(ellipse at 50% 45%,#6b7077,#0f1115)}
  .badge{font-size:11px;padding:3px 8px;border-radius:11px}
  .b-new{color:#06201c;background:var(--ac)}
  .b-done{color:var(--mut);border:1px solid var(--bd)}
  .b-ctrl{color:#412402;background:#EF9F27}
  .status{display:flex;justify-content:space-between;background:var(--chrome);border-top:1px solid var(--bd);padding:5px 14px;font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="brand"><span class="dot"></span>DaliView <span style="color:var(--mut);font-weight:400">· Менеджер исследований</span></div>
    <div class="r"><a href="daliview.html" class="ac"><i class="ti ti-photo"></i> Вьювер</a><span><i class="ti ti-user"></i> Иванова О.П.</span><span class="ac"><i class="ti ti-plug-connected"></i> DaliStore</span></div>
  </div>

  <div class="filters">
    <input id="q" placeholder="Поиск: фамилия / ID" oninput="render()" style="min-width:200px">
    <select id="mod" onchange="render()"><option value="">Модальность: все</option><option>DX</option><option>Флюоро</option></select>
    <span class="qf on" onclick="qf(this,'today')">Сегодня</span>
    <span class="qf" onclick="qf(this,'week')">Неделя</span>
    <span class="qf" onclick="qf(this,'')">Все</span>
    <span style="margin-left:auto;color:var(--dim);font-size:12px" id="cnt"></span>
  </div>

  <div class="wrap">
    <table>
      <thead><tr><th></th><th>Пациент</th><th>Дата рожд.</th><th>Пол</th><th>Исследование</th><th>Модальность</th><th>Дата</th><th>Статус</th></tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>

  <div class="status"><span>PostgreSQL · подключено</span><span>Worklist: live (SignalR)</span><span>Linux / Astra</span><span id="clock"></span></div>
</div>

<script>
const data=[
 {s:'Иванов',n:'П.С.',b:'12.03.1958',sex:'М',st:'ОГК, прямая',mod:'DX',d:'сегодня 15:31',state:'new',period:'today'},
 {s:'Петрова',n:'А.И.',b:'04.07.1972',sex:'Ж',st:'Флюорография',mod:'Флюоро',d:'сегодня 14:02',state:'done',period:'today'},
 {s:'Сидоров',n:'О.П.',b:'21.11.1965',sex:'М',st:'ОГК, прямая',mod:'DX',d:'сегодня 13:48',state:'done',period:'today'},
 {s:'Кузьмина',n:'М.А.',b:'30.01.1949',sex:'Ж',st:'ОГК, S6 справа',mod:'DX',d:'сегодня 12:30',state:'ctrl',period:'today'},
 {s:'Романова',n:'З.А.',b:'09.11.1937',sex:'Ж',st:'ОГК',mod:'DX',d:'вчера 17:10',state:'done',period:'week'},
 {s:'Лебедев',n:'И.К.',b:'18.05.1980',sex:'М',st:'Флюорография',mod:'Флюоро',d:'2 дня назад',state:'done',period:'week'},
];
let qfilter='today';
const badge=s=>s==='new'?'<span class="badge b-new">новое</span>':s==='ctrl'?'<span class="badge b-ctrl">контроль</span>':'<span class="badge b-done">описано</span>';
function qf(el,p){qfilter=p;document.querySelectorAll('.qf').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase(),m=document.getElementById('mod').value,tb=document.getElementById('tb');tb.innerHTML='';
  const rows=data.filter(r=>(r.s+' '+r.n).toLowerCase().includes(q)&&(!m||r.mod===m)&&(!qfilter||r.period===qfilter||(qfilter==='week')));
  rows.forEach((r,i)=>{const tr=document.createElement('tr');if(i===0)tr.className='sel';
    tr.innerHTML=`<td><div class="th"></div></td><td style="color:#e6edf3">${r.s} ${r.n}</td><td>${r.b}</td><td>${r.sex}</td><td>${r.st}</td><td>${r.mod}</td><td style="color:var(--mut)">${r.d}</td><td>${badge(r.state)}</td>`;
    tr.ondblclick=()=>location.href='daliview.html';tr.onclick=()=>{document.querySelectorAll('#tb tr').forEach(x=>x.classList.remove('sel'));tr.classList.add('sel');};
    tb.appendChild(tr);});
  document.getElementById('cnt').textContent=rows.length+' исследований · двойной клик → вьювер';
}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('ru-RU');setTimeout(tick,1000);}
render();tick();
</script>
</body>
</html>
